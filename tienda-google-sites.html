<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Premium Lumina</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --text-color: #334155;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        h1, h2, h3 {
            color: var(--primary-color);
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            font-size: 1rem;
            position: relative;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-color);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cart-icon {
            font-size: 1.3rem;
            position: relative;
            cursor: pointer;
            color: var(--primary-color);
            transition: var(--transition);
        }

        .cart-icon:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        #cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background-color: var(--accent-color);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 50%;
            transition: var(--transition);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            padding: 0 20px;
        }

        .hero-content h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #0f172a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 1s ease;
        }

        .hero-content p {
            font-size: 1.25rem;
            margin-bottom: 2.5rem;
            color: #475569;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 1s ease 0.2s;
            animation-fill-mode: backwards;
        }

        .cta-btn {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background-color: var(--accent-color);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
            animation: fadeInUp 1s ease 0.4s;
            animation-fill-mode: backwards;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 20px -3px rgba(59, 130, 246, 0.5);
            background-color: #2563eb;
        }

        /* Products Section */
        .products-section {
            padding: 6rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px -5px rgba(0, 0, 0, 0.1);
        }

        .product-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.08);
        }

        .img-container {
            overflow: hidden;
            position: relative;
        }

        .product-info {
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .product-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .add-to-cart {
            margin-top: auto;
            width: 100%;
            padding: 0.9rem;
            background-color: #f1f5f9;
            color: var(--primary-color);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-to-cart:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* Footer */
        .footer {
            background-color: var(--primary-color);
            color: #94a3b8;
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 4rem;
            font-size: 0.9rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hero-content h1 {
                font-size: 3rem;
            }
            .hero-content p {
                font-size: 1.1rem;
            }
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Lumina<span>.</span></div>
        <ul class="nav-links">
            <li><a href="#home">Inicio</a></li>
            <li><a href="#products">Productos</a></li>
            <li><a href="#contact">Contacto</a></li>
        </ul>
        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <h1>Descubre la Elegancia</h1>
            <p>Explora nuestra colección exclusiva de productos seleccionados cuidadosamente para ti.</p>
            <button class="cta-btn" onclick="document.getElementById('products').scrollIntoView({behavior: 'smooth'})">Explorar Ahora</button>
        </div>
    </header>

    <main id="products" class="products-section">
        <h2 class="section-title">Nuestros Productos</h2>
        <div class="product-grid" id="productGrid">
            <!-- Los productos se cargarán dinámicamente con JavaScript -->
        </div>
    </main>

    <footer id="contact" class="footer">
        <p>&copy; 2026 Lumina. Todos los derechos reservados.</p>
    </footer>

    <script>
        // Datos de productos
        const products = [
            {
                id: 1,
                title: "Auriculares Alpha Noise",
                category: "Audio",
                price: 299.99,
                image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=800"
            },
            {
                id: 2,
                title: "Reloj Inteligente Chronos",
                category: "Accesorios",
                price: 199.50,
                image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&q=80&w=800"
            },
            {
                id: 3,
                title: "Cámara DSLR Pro 4K",
                category: "Fotografía",
                price: 899.00,
                image: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=800"
            },
            {
                id: 4,
                title: "Altavoz Bluetooth Bass",
                category: "Audio",
                price: 129.99,
                image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?auto=format&fit=crop&q=80&w=800"
            },
            {
                id: 5,
                title: "Teclado Mecánico Neo",
                category: "Computación",
                price: 149.99,
                image: "https://images.unsplash.com/photo-1595225476474-87563907a212?auto=format&fit=crop&q=80&w=800"
            },
            {
                id: 6,
                title: "Gafas de Sol Óptica",
                category: "Moda",
                price: 89.99,
                image: "https://images.unsplash.com/photo-1572635196237-14b3f281501f?auto=format&fit=crop&q=80&w=800"
            }
        ];

        let cartCount = 0;

        function renderProducts() {
            const productGrid = document.getElementById('productGrid');
            
            products.forEach((product, index) => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.style.animation = `fadeInUp 0.6s ease ${index * 0.1}s backwards`;
                
                productCard.innerHTML = `
                    <div class="img-container">
                        <img src="${product.image}" loading="lazy" alt="${product.title}" class="product-img">
                    </div>
                    <div class="product-info">
                        <span class="product-category">${product.category}</span>
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-price">$${product.price.toFixed(2)}</p>
                        <button class="add-to-cart" onclick="addToCart(this)">Añadir al carrito</button>
                    </div>
                `;
                
                productGrid.appendChild(productCard);
            });
        }

        function addToCart(button) {
            cartCount++;
            const cartCountEl = document.getElementById('cart-count');
            cartCountEl.textContent = cartCount;
            
            cartCountEl.style.transform = 'scale(1.5)';
            setTimeout(() => {
                cartCountEl.style.transform = 'scale(1)';
            }, 300);
            
            const originalText = button.textContent;
            button.textContent = '¡Añadido!';
            button.style.backgroundColor = '#10b981';
            button.style.color = 'white';
            
            setTimeout(() => {
                button.textContent = originalText;
                button.style.backgroundColor = '';
                button.style.color = '';
            }, 1500);
            
            const cartIcon = document.querySelector('.cart-icon');
            cartIcon.style.transform = 'scale(1.2)';
            setTimeout(() => {
                cartIcon.style.transform = 'scale(1)';
            }, 200);
        }

        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
                navbar.style.background = 'rgba(255, 255, 255, 0.95)';
            } else {
                navbar.style.boxShadow = '0 4px 6px -1px rgba(0, 0, 0, 0.05)';
                navbar.style.background = 'rgba(255, 255, 255, 0.85)';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
        });
    </script>
</body>
</html>
